services:
  mysql:
    image: mysql:8.4
    container_name: makcom_ads_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: makcom_ads
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: makcom_ads_migrate
    env_file:
      - .env.production
    command: npx prisma migrate deploy
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - migrate

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: makcom_ads_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      mysql:
        condition: service_healthy


volumes:
  mysql_data:
